name: SmartPromptingMac
options:
  bundleIdPrefix: com.smartprompting
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  SmartPromptingCore:
    path: ../..

targets:
  SmartPromptingMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.entitlements"
          - Info.plist
    info:
      path: Info.plist
    entitlements:
      path: SmartPromptingMac.entitlements
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.smartprompting.mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: SmartPromptingCore
